<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle PQR — Colombina te Escucha</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background: #fbf8f2; margin: 0; padding: 30px 20px; color: #22243a; }
  .wrap { max-width: 640px; margin: 0 auto; }
  .back { display: inline-block; margin-bottom: 16px; color: #293184; text-decoration: none; font-weight: 600; font-size: 14px; }
  .card { background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 6px 20px rgba(41,49,132,0.1); }
  h1 { font-family: 'Fredoka', sans-serif; color: #293184; font-size: 20px; margin: 0 0 4px; }
  .fecha { color: #8a8ca3; font-size: 13px; margin-bottom: 20px; }
  .tag { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 600; color: #fff; margin-bottom: 20px; }
  .tag-Petición { background: #4a5cc9; }
  .tag-Queja { background: #e11d1f; }
  .tag-Reclamo { background: #b3161a; }
  .tag-Sugerencia { background: #f0a93b; }
  .tag-Felicitación { background: #2ea043; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .campo span { display: block; font-size: 11.5px; font-weight: 600; color: #6b6d85; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 3px; }
  .campo p { margin: 0; font-size: 14.5px; }
  .detalle-box { background: #f1efe8; border-radius: 10px; padding: 16px; font-size: 14.5px; line-height: 1.6; white-space: pre-wrap; }
  .acciones { margin-top: 24px; display: flex; justify-content: flex-end; }
  .btn-eliminar { padding: 9px 18px; border-radius: 999px; background: #fdeaea; color: #e11d1f; border: 1px solid #f7c3c3; font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .btn-eliminar:hover { background: #f7c3c3; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="{{ url_for('admin', clave=clave) }}">&larr; Volver al listado</a>
    <div class="card">
      <span class="tag tag-{{ r['tipo_pqr'] }}">{{ r['tipo_pqr'] }}</span>
      <h1>{{ r['nombre'] }}</h1>
      <div class="fecha">{{ r['fecha'] }} (hora Colombia)</div>

      <div class="grid">
        <div class="campo"><span>CIN</span><p>{{ r['cin'] }}</p></div>
        <div class="campo"><span>Ruta</span><p>{{ r['ruta'] }}</p></div>
        <div class="campo"><span>Municipio</span><p>{{ r['municipio'] }}</p></div>
        <div class="campo"><span>Conductor(a)</span><p>{{ r['conductor'] }}</p></div>
        <div class="campo"><span>Placa</span><p>{{ r['placa'] }}</p></div>
      </div>

      <div class="campo">
        <span>Detalle del PQR</span>
        <div class="detalle-box">{{ r['detalle'] }}</div>
      </div>

      <div class="acciones">
        <form method="POST" action="{{ url_for('admin_eliminar', pqr_id=r['id']) }}" onsubmit="return confirm('¿Eliminar este registro de forma permanente?');">
          <input type="hidden" name="clave" value="{{ clave }}">
          <button type="submit" class="btn-eliminar">Eliminar este registro</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
